  <style>
    * { box-sizing: border-box; }
    body { min-height: 100vh; color: #111; font-family: "Noto Sans JP", sans-serif; background: linear-gradient(rgba(17,17,17,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(17,17,17,.07) 1px, transparent 1px), linear-gradient(135deg, #ffe66f 0%, #ff79c9 45%, #35ffd4 100%); background-size: 24px 24px, 24px 24px, auto; }
    .screen { display: none; } .screen.active { display: block; }
    .pressy { transition: transform .12s ease, box-shadow .12s ease; } .pressy:active { transform: translate(5px, 5px); box-shadow: 1px 1px 0 #111; }
    .card { border: 4px solid #111; border-radius: 8px; background: #fff; box-shadow: 8px 8px 0 #111; }
    .mini-card { border: 3px solid #111; border-radius: 8px; background: #fff; box-shadow: 4px 4px 0 #111; }
    .asset { display: block; object-fit: contain; } .floaty { animation: floaty 2.4s ease-in-out infinite; } .bob { animation: bob 1.8s ease-in-out infinite; } .ticker { animation: ticker 22s linear infinite; }

    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } } @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

<body>
  <main class="mx-auto w-full max-w-5xl px-4 py-5 sm:py-8">
    <header class="chrome mb-4 flex items-center justify-between gap-3"><div class="mini-card bg-yellow-200 px-4 py-2 font-pop text-sm font-black">OPANCHU SURVIVAL LAB</div><button id="homeBtn" class="hidden mini-card bg-white px-4 py-2 font-black pressy" aria-label="ホーム"><i class="fa-solid fa-house"></i></button></header>
    <section id="welcome" class="screen active"><div class="grid gap-5 lg:grid-cols-[minmax(0,1fr)_380px] lg:items-stretch"><div class="card overflow-hidden bg-yellow-100"><div class="border-b-4 border-black bg-pink-300 px-5 py-3 font-black"><i class="fa-solid fa-door-open"></i> 扉ページ</div><div class="p-5 sm:p-7"><p class="inline-block rounded-full border-4 border-black bg-white px-4 py-2 font-black">男子禁制・エロ期待厳禁</p><h1 class="mt-5 font-pop text-4xl font-black leading-tight sm:text-6xl">JKパンツ<br>生存戦略診断</h1><p class="mt-4 max-w-xl text-lg font-black leading-relaxed">今日のパンツをサバイバルギアとして解析。前髪、DM、BeReal、体育、週末の気力から、偏見100%でメンタルを判定します。</p><div class="mt-5 rounded-lg border-4 border-red-600 bg-red-100 p-4 font-bold leading-relaxed text-red-700">セクシー要素は1ミリもありません。これはギャグ、ツッコミ待ち、SNSに晒して笑うための診断です。</div><button id="startBtn" class="pressy mt-7 w-full rounded-lg border-4 border-black bg-pink-400 px-6 py-5 text-xl font-black shadow-brutal sm:w-auto">診断スタート <i class="fa-solid fa-arrow-right"></i></button></div></div><div class="card relative overflow-hidden bg-[#ffd966] p-3"><img id="guideAsset" class="asset mx-auto h-full max-h-[690px] w-full drop-shadow-[0_8px_0_rgba(17,17,17,.18)]" alt="診断ガイドキャラクター"><div class="absolute bottom-4 left-4 right-4 rounded-lg border-4 border-black bg-white/95 p-3 font-black shadow-brutalSm">案内役：普通パンツから出発。今日の装備メンタル、こっそり診断します。</div></div></div></section>
    <section id="quiz" class="screen"><div class="grid gap-5"><div><div class="mb-5 mini-card bg-white p-2"><div class="h-5 overflow-hidden rounded-full border-2 border-black bg-yellow-100"><div id="progress" class="h-full rounded-full bg-pink-400 transition-all duration-300" style="width:20%"></div></div></div><div class="card p-5 sm:p-7"><div class="mb-4 flex items-center justify-between gap-3"><span id="qCount" class="mini-card bg-yellow-300 px-4 py-2 font-pop font-black">Q1/5</span><span id="qMascot" class="text-4xl">📝</span></div><h2 id="question" class="text-2xl font-black leading-relaxed sm:text-3xl"></h2><div id="choices" class="mt-6 grid gap-3"></div></div></div></div></section>
    <section id="loading" class="screen"><div class="card overflow-hidden bg-white text-center"><div class="flex gap-6 overflow-hidden border-b-4 border-black bg-yellow-200 py-3"><div id="loadingRail" class="ticker flex min-w-max gap-6"></div></div><div class="p-8"><img id="loadingMainOcto" class="asset floaty mx-auto h-44 w-44 rounded-full border-4 border-black bg-pink-200/70 shadow-brutal" alt="分析タコパン"><p class="mt-6 inline-block rounded-full border-4 border-black bg-yellow-200 px-4 py-2 font-black">タコパン鑑定中</p><p id="loadingText" class="mt-5 text-2xl font-black leading-relaxed">偏見を高速精製中...</p></div></div></section>
    <section id="result" class="screen"><div id="resultCard" class="card overflow-hidden p-0"><div class="grid gap-0 lg:grid-cols-[280px_minmax(0,1fr)]"><div class="border-b-4 border-black bg-white p-5 lg:border-b-0 lg:border-r-4"><img id="resultGirl" class="asset mx-auto h-72 w-full rounded-lg border-4 border-black bg-yellow-100 shadow-brutalSm" style="object-fit:contain" alt="タイプ別キャラクター"><img id="resultGear" class="asset mx-auto mt-4 h-44 w-44 rounded-lg border-4 border-black bg-yellow-100/60 shadow-brutalSm" alt="判定ギア"><p class="mt-4 rounded-lg border-4 border-black bg-emerald-200 p-2 text-center text-sm font-black">判定ギア</p></div><div id="resultBody" class="p-5 sm:p-7"><p class="font-pop text-sm font-black uppercase">Survival verdict</p><div class="mt-2 flex items-start justify-between gap-3"><h2 id="resultTitle" class="text-3xl font-black leading-tight sm:text-5xl"></h2><div id="resultIcon" class="text-6xl"></div></div><p id="resultSub" class="mt-4 rounded-lg border-4 border-black bg-white/90 p-3 text-lg font-black leading-relaxed"></p><p id="resultDesc" class="mt-4 rounded-lg border-4 border-black bg-white p-4 font-bold leading-relaxed"></p><div id="params" class="mt-5 grid gap-3"></div><div class="share-tools mt-6 grid gap-3 sm:grid-cols-2"><button id="copyBtn" class="pressy rounded-lg border-4 border-black bg-yellow-300 px-4 py-3 font-black shadow-brutalSm"><i class="fa-regular fa-copy"></i> 結果をコピー</button><button id="shotBtn" class="pressy rounded-lg border-4 border-black bg-white px-4 py-3 font-black shadow-brutalSm"><i class="fa-solid fa-mobile-screen"></i> スクショ用</button></div><div class="share-tools mt-4 grid grid-cols-2 gap-3 sm:grid-cols-5"><button class="shareBtn mini-card bg-pink-300 py-3 font-black pressy" data-share="Instagramはスクショで晒してツッコミ回収。"><i class="fa-brands fa-instagram"></i> Instagram</button><button class="shareBtn mini-card bg-white py-3 font-black pressy" data-share="BeRealには結果画面をそのまま投下。"><i class="fa-solid fa-camera-retro"></i> BeReal</button><button class="shareBtn mini-card bg-black py-3 font-black text-white pressy" data-share="X用に結果をコピーしました。"><i class="fa-brands fa-x-twitter"></i> X</button><button class="shareBtn mini-card bg-green-300 py-3 font-black pressy" data-share="LINEで友達に送ってください。"><i class="fa-brands fa-line"></i> LINE</button><button class="shareBtn mini-card bg-purple-200 py-3 font-black pressy" data-share="Threadsは一言ツッコミ付きが正解。"><i class="fa-brands fa-threads"></i> Threads</button></div></div></div></div><div class="board-panel card mt-8 p-5"><h3 class="text-2xl font-black"><i class="fa-solid fa-comments"></i> ツッコミ掲示板</h3><form id="boardForm" class="mt-4 grid gap-3 sm:grid-cols-[140px_1fr_auto]"><input id="boardName" maxlength="16" class="rounded-lg border-4 border-black px-3 py-3 font-bold" placeholder="名前"><input id="boardText" maxlength="80" class="rounded-lg border-4 border-black px-3 py-3 font-bold" placeholder="ツッコミを書く"><button class="pressy rounded-lg border-4 border-black bg-emerald-300 px-5 py-3 font-black shadow-brutalSm">投稿</button></form><div id="boardList" class="mt-4 grid gap-3"></div></div></section>
  </main><div id="toast" class="fixed bottom-4 left-1/2 hidden -translate-x-1/2 rounded-full border-4 border-black bg-white px-5 py-3 font-black shadow-brutalSm"></div>

    const results = { tie: { name: '紐パンタイプ', icon: '🎀', gear: 'tie', girl: 'girl_tie', gradient: 'linear-gradient(135deg,#ff5bbd,#ff9fcb,#fff06b)', sub: '自らメンヘラの沼に片足を突っ込んでいる状態', params: { 'メンタル安定度': 20, '警戒心': 15, '省エネ率': 35 }, desc: '誰に見せるわけでもないのに紐を選んだあなた。現在のメンタルは「かまってちゃんメーター」が限界突破中。DMの返信が3分遅れると脳内大反省会を開くタイプ。頼むから今すぐ紐を固結びして心を落ち着かせて！' }, tback: { name: 'Tバックタイプ', icon: '⚔️', gear: 'tback', girl: 'girl_tback', gradient: 'linear-gradient(135deg,#ff8a00,#ffd36d,#ff4f8b)', sub: '違和感を美学に変換できる無敵武士', params: { 'メンタル安定度': 85, '警戒心': 40, '省エネ率': 10 }, desc: 'これを穿きこなす精神力はもはや武士。周囲の目を一切無視し、我が道を行く強靭なハートを持つ孤高のギャルです。' }, sanitary: { name: 'サニタリーショーツタイプ', icon: '🛡️', gear: 'sanitary', girl: 'girl_sanitary', gradient: 'linear-gradient(135deg,#47a7ff,#9be7ff,#ffffff)', sub: '世界への警戒心がMAXの鉄壁ディフェンス状態', params: { 'メンタル安定度': 45, '警戒心': 95, '省エネ率': 50 }, desc: '今日のあなたは人間不信・超警戒モード。親しいフリしたDMの社交辞令を冷めた目で見抜き、くだらないおふざけには完全にシャッターを閉ざしています。' }, gray: { name: 'ヨレヨレ・ネズミ色タイプ', icon: '💤', gear: 'gray', girl: 'girl_gray', gradient: 'linear-gradient(135deg,#808893,#d7dce2,#fff36d)', sub: '女子を完全に休業して野生に還っている状態', params: { 'メンタル安定度': 10, '警戒心': 30, '省エネ率': 100 }, desc: '今日の戦略はHP温存。学校には出席日数を稼ぐためだけに登校し、脳内キャパを100%推し活や昼寝に回している自由で野性的な戦士です。' }, seamless: { name: 'シームレスタイプ', icon: '👤', gear: 'seamless', girl: 'girl_seamless', gradient: 'linear-gradient(135deg,#00d6a3,#a9ffe8,#fff)', sub: '気配とラインを完全に消し去った隠密暗殺者', params: { 'メンタル安定度': 65, '警戒心': 60, '省エネ率': 45 }, desc: '周囲の人間関係に適度に適応し、最高のポジションで波風立てずに生き残る現代っ子。本音を絶対に悟られたくない高度なステルス迷彩の使い手です。' } };

    let current = 0; let scores = { tie: 0, tback: 0, sanitary: 0, gray: 0, seamless: 0 }; let currentResult = null; const $ = id => document.getElementById(id); const screens = ['welcome','quiz','loading','result'];
    function img(key, cls = '') { return `<img class="asset ${cls}" src="${ASSETS[key]}" alt="">`; } function show(id) { screens.forEach(s => $(s).classList.toggle('active', s === id)); $('homeBtn').classList.toggle('hidden', id === 'welcome'); document.body.classList.remove('screenshot-mode'); } function toast(message) { $('toast').textContent = message; $('toast').classList.remove('hidden'); setTimeout(() => $('toast').classList.add('hidden'), 2200); }

${currentResult.sub}
${currentResult.desc}`; } async function copyText(text) { if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); return true; } const area = document.createElement('textarea'); area.value = text; area.setAttribute('readonly',''); area.style.position = 'fixed'; area.style.opacity = '0'; document.body.appendChild(area); area.select(); const ok = document.execCommand('copy'); area.remove(); return ok; }
    function loadBoard() { const saved = localStorage.getItem('jk_survival_board'); return saved ? JSON.parse(saved) : presets; } function saveBoard(items) { localStorage.setItem('jk_survival_board', JSON.stringify(items.slice(0, 20))); } function escapeHtml(text) { return String(text).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch])); }
    function renderBoard() { $('boardList').innerHTML = ''; loadBoard().forEach((item, index) => { const post = document.createElement('div'); post.className = 'grid grid-cols-[54px_1fr] gap-3 rounded-lg border-4 border-black bg-yellow-100 p-3'; post.innerHTML = `<div class="flex h-12 w-12 items-center justify-center rounded-full border-2 border-black bg-white text-xl font-black">#</div><div><p class="font-black text-pink-700">${escapeHtml(item.name || '名無し')}</p><p class="mt-1 font-bold leading-relaxed">${escapeHtml(item.text)}</p></div>`; $('boardList').appendChild(post); }); }
    $('startBtn').addEventListener('click', () => { current = 0; scores = { tie: 0, tback: 0, sanitary: 0, gray: 0, seamless: 0 }; renderQuestion(); show('quiz'); }); $('homeBtn').addEventListener('click', () => show('welcome')); $('copyBtn').addEventListener('click', async () => toast(await copyText(resultText()) ? '結果テキストをコピーしました' : 'コピーできませんでした')); $('shotBtn').addEventListener('click', event => { event.stopPropagation(); document.body.classList.toggle('screenshot-mode'); toast(document.body.classList.contains('screenshot-mode') ? 'スクショ用表示にしました' : '通常表示に戻しました'); }); document.addEventListener('click', () => { if (!document.body.classList.contains('screenshot-mode')) return; document.body.classList.remove('screenshot-mode'); toast('通常表示に戻しました'); }); document.addEventListener('keydown', event => { if (event.key === 'Escape' && document.body.classList.contains('screenshot-mode')) { document.body.classList.remove('screenshot-mode'); toast('通常表示に戻しました'); } }); document.querySelectorAll('.shareBtn').forEach(button => button.addEventListener('click', async () => { await copyText(resultText()); toast(button.dataset.share); })); $('boardForm').addEventListener('submit', event => { event.preventDefault(); const name = $('boardName').value.trim() || '名無し'; const text = $('boardText').value.trim(); if (!text) return toast('ツッコミ本文を入れてね'); saveBoard([{ name, text }, ...loadBoard()]); $('boardText').value = ''; renderBoard(); toast('掲示板に投稿しました'); }); hydrateAssets();
