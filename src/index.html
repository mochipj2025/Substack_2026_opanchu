<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="6; url=../index.html">
  <title>入口ページが移動しました</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(17, 17, 17, .07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, .07) 1px, transparent 1px),
        linear-gradient(135deg, #ffe66f 0%, #ff8fc8 48%, #35ffd4 100%);
      background-size: 24px 24px, 24px 24px, auto;
      padding: 18px;
    }
    main {
      min-height: calc(100vh - 36px);
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(720px, 100%);
      border: 4px solid #111;
      border-radius: 8px;
      background: white;
      box-shadow: 8px 8px 0 #111;
      overflow: hidden;
    }
    .head {
      border-bottom: 4px solid #111;
      background: #7dd7ff;
      padding: 18px;
    }
    .body {
      padding: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 12px 0 0;
      font-weight: 850;
      line-height: 1.6;
    }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 4px solid #111;
      border-radius: 8px;
      background: #ffe66f;
      box-shadow: 5px 5px 0 #111;
      color: inherit;
      padding: 16px 18px;
      text-decoration: none;
      font-weight: 1000;
    }
    a.game {
      background: #ff67b3;
    }
    small {
      display: block;
      margin-top: 4px;
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="入口案内">
      <div class="head">
        <h1>このURLは<br>入口に変わりました</h1>
      </div>
      <div class="body">
        <p>ここは以前の診断URLです。今は「診断」と「ゲーム」を選ぶ入口ページへ移動します。</p>
        <p>6秒後に自動で入口へ移動します。すぐ開く場合は下のボタンを押してください。</p>
        <div class="links">
          <a href="../index.html">
            <span>おぱんちゅラボ入口<small>診断とゲームを選ぶトップページ</small></span>
            <span>→</span>
          </a>
          <a href="diagnosis.html">
            <span>診断を直接開く<small>旧ページの中身はこちらに移動しました</small></span>
            <span>→</span>
          </a>
          <a class="game" href="memory-game.html">
            <span>神経衰弱を開く<small>タコパンカードのミニゲーム</small></span>
            <span>→</span>
          </a>
          <a class="game" href="merge-game.html">
            <span>マージを開く<small>パンツ札を進化させる合体パズル</small></span>
            <span>→</span>
          </a>
          <a class="game" href="match3-game.html">
            <span>お片づけパズルを開く<small>札を入れ替えて3つ以上そろえるパズル</small></span>
            <span>→</span>
          </a>
          <a class="game" href="battle-game.html">
            <span>盤上バトルを開く<small>2人で遊ぶローカル対戦ゲーム</small></span>
            <span>→</span>
          </a>
          <a class="game" href="omikuji-game.html">
            <span>おぱんちゅみくじを開く<small>今日の運勢とラッキーおぱんちゅを引く占い</small></span>
            <span>→</span>
          </a>
        </div>
      </div>
    </section>
  </main>
  <script>
    setTimeout(() => {
      location.replace("../index.html");
    }, 6000);
  </script>
</body>
</html>
