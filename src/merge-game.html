<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おぱんちゅマージ</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #111;
      --pink: #ff67b3;
      --yellow: #ffe66f;
      --mint: #35ffd4;
      --blue: #7dd7ff;
      --paper: #fffaf0;
      --shadow: 6px 6px 0 var(--ink);
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(17, 17, 17, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, .08) 1px, transparent 1px),
        linear-gradient(135deg, var(--yellow), #ff9bd1 48%, var(--mint));
      background-size: 22px 22px, 22px 22px, auto;
    }
    button, a { color: inherit; font: inherit; }
    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand, .icon-btn, .stat, .panel, .tile-guide {
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }
    .brand {
      padding: 10px 14px;
      font-weight: 1000;
      line-height: 1.1;
    }
    .brand span {
      display: block;
      font-size: 12px;
      letter-spacing: 0;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    .icon-btn {
      display: grid;
      place-items: center;
      min-width: 48px;
      min-height: 48px;
      padding: 8px 12px;
      text-decoration: none;
      font-weight: 1000;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .icon-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0 var(--ink);
    }
    .panel {
      overflow: hidden;
      background: var(--paper);
    }
    .game-head {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-bottom: 4px solid var(--ink);
      background: var(--blue);
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 62px);
      line-height: .95;
      letter-spacing: 0;
    }
    .lead {
      margin: 8px 0 0;
      max-width: 720px;
      font-weight: 850;
      line-height: 1.55;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      padding: 9px;
      box-shadow: 4px 4px 0 var(--ink);
      text-align: center;
      min-width: 0;
    }
    .stat-label {
      display: block;
      font-size: 12px;
      font-weight: 900;
    }
    .stat-value {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 22px;
      font-weight: 1000;
      line-height: 1;
    }
    .play-area {
      display: grid;
      gap: 14px;
      padding: 14px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      width: calc(100% - 8px);
      max-width: 620px;
      margin: 0 auto;
      touch-action: none;
    }
    .cell {
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, .62);
      box-shadow: 4px 4px 0 rgba(17, 17, 17, .28);
      overflow: hidden;
    }
    .tile {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 4px;
      width: 100%;
      height: 100%;
      padding: 6px;
      border: 0;
      background: white;
      animation: pop .13s ease-out;
    }
    .tile img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      filter: drop-shadow(0 4px 0 rgba(17, 17, 17, .16));
    }
    .tile span {
      overflow: hidden;
      text-align: center;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: clamp(10px, 2.6vw, 13px);
      font-weight: 1000;
      line-height: 1.05;
    }
    @keyframes pop {
      from { transform: scale(.92); }
      to { transform: scale(1); }
    }
    .tile-guide {
      display: grid;
      gap: 10px;
      padding: 12px;
      box-shadow: 5px 5px 0 var(--ink);
    }
    .guide-title {
      margin: 0;
      font-size: 18px;
      font-weight: 1000;
    }
    .next-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .next-row img {
      width: 78px;
      aspect-ratio: 1 / 1;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: #fffaf0;
      object-fit: contain;
      padding: 5px;
    }
    .message {
      min-height: 1.5em;
      margin: 0;
      font-weight: 900;
      line-height: 1.5;
    }
    .progress {
      height: 18px;
      overflow: hidden;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
    }
    .progress div {
      height: 100%;
      background: var(--pink);
      transition: width .18s ease;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      display: none;
      transform: translateX(-50%);
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: white;
      box-shadow: 5px 5px 0 var(--ink);
      padding: 10px 16px;
      font-weight: 1000;
      text-align: center;
      width: min(420px, calc(100% - 32px));
    }
    .toast.show { display: block; }
    @media (min-width: 820px) {
      main { padding: 24px; }
      .game-head {
        grid-template-columns: minmax(0, 1fr) 330px;
        align-items: end;
        padding: 18px;
      }
      .play-area {
        grid-template-columns: minmax(0, 620px) 260px;
        justify-content: center;
        align-items: start;
        padding: 18px;
      }
    }
    @media (max-width: 460px) {
      main { padding: 10px; }
      .topbar { align-items: stretch; }
      .brand { flex: 1; }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .stat { padding: 7px 5px; }
      .stat-value { font-size: 18px; }
      .board { gap: 7px; }
      .cell { border-width: 3px; }
      .tile { padding: 4px; }
      .tile span { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div class="brand"><span>OPANCHU MERGE</span>おぱんちゅマージ</div>
      <div class="actions">
        <a class="icon-btn" href="../index.html" title="入口へ戻る" aria-label="入口へ戻る">⌂</a>
        <button class="icon-btn" id="resetBtn" type="button" title="最初から" aria-label="最初から">↻</button>
      </div>
    </div>

    <section class="panel" aria-label="おぱんちゅマージ">
      <div class="game-head">
        <div>
          <h1>おぱんちゅ<br>マージ</h1>
          <p class="lead">矢印キーかスワイプで札を動かします。同じパンツ札がぶつかると合体して、次の種類に進化します。</p>
        </div>
        <div class="stats" aria-label="スコア">
          <div class="stat"><span class="stat-label">スコア</span><span class="stat-value" id="score">0</span></div>
          <div class="stat"><span class="stat-label">最高</span><span class="stat-value" id="best">0</span></div>
          <div class="stat"><span class="stat-label">最大札</span><span class="stat-value" id="maxTile">01</span></div>
        </div>
      </div>

      <div class="play-area">
        <div class="board" id="board" aria-label="マージ盤面"></div>
        <aside class="tile-guide" aria-label="進化状況">
          <p class="guide-title">次に目指す札</p>
          <div class="next-row">
            <img id="nextImage" src="../assets/shorts/p02.png" alt="">
            <p class="message" id="message">同じ札を重ねて進化させよう。</p>
          </div>
          <div class="progress" aria-label="進化進捗"><div id="progress"></div></div>
          <button class="icon-btn" id="copyBtn" type="button">□ 結果コピー</button>
        </aside>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const items = [
      { name: "おぱんちゅ 01", src: "../assets/shorts/p01.png" },
      { name: "おぱんちゅ 02", src: "../assets/shorts/p02.png" },
      { name: "おぱんちゅ 03", src: "../assets/shorts/p03.png" },
      { name: "おぱんちゅ 04", src: "../assets/shorts/p04.png" },
      { name: "おぱんちゅ 05", src: "../assets/shorts/p05.png" },
      { name: "おぱんちゅ 06", src: "../assets/shorts/p06.png" },
      { name: "おぱんちゅ 07", src: "../assets/shorts/p07.png" },
      { name: "おぱんちゅ 08", src: "../assets/shorts/p08.png" },
      { name: "おぱんちゅ 09", src: "../assets/shorts/p09.png" },
      { name: "おぱんちゅ 10", src: "../assets/shorts/p10.png" },
      { name: "おぱんちゅ 11", src: "../assets/shorts/p11.png" },
      { name: "おぱんちゅ 12", src: "../assets/shorts/p12.png" }
    ];
    const size = 4;
    const bestKey = "opanchu_merge_best";
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const maxTileEl = document.getElementById("maxTile");
    const nextImageEl = document.getElementById("nextImage");
    const messageEl = document.getElementById("message");
    const progressEl = document.getElementById("progress");
    const toastEl = document.getElementById("toast");
    let grid = [];
    let score = 0;
    let maxRank = 0;
    let gameOver = false;
    let touchStart = null;

    function emptyGrid() {
      return Array.from({ length: size }, () => Array(size).fill(null));
    }

    function setup() {
      grid = emptyGrid();
      score = 0;
      maxRank = 0;
      gameOver = false;
      addRandomTile();
      addRandomTile();
      render();
    }

    function addRandomTile() {
      const empties = [];
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          if (grid[r][c] === null) empties.push([r, c]);
        }
      }
      if (!empties.length) return false;
      const [r, c] = empties[Math.floor(Math.random() * empties.length)];
      grid[r][c] = Math.random() < 0.86 ? 0 : 1;
      return true;
    }

    function render() {
      boardEl.innerHTML = "";
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const rank = grid[r][c];
          if (rank !== null) {
            const item = items[rank];
            cell.innerHTML = `<div class="tile"><img src="${item.src}" alt=""><span>${item.name}</span></div>`;
          }
          boardEl.appendChild(cell);
        }
      }
      const best = Math.max(Number(localStorage.getItem(bestKey) || 0), score);
      localStorage.setItem(bestKey, String(best));
      scoreEl.textContent = score;
      bestEl.textContent = best;
      maxTileEl.textContent = String(maxRank + 1).padStart(2, "0");
      const nextRank = Math.min(maxRank + 1, items.length - 1);
      nextImageEl.src = items[nextRank].src;
      progressEl.style.width = `${((maxRank + 1) / items.length) * 100}%`;
      if (maxRank >= items.length - 1) {
        messageEl.textContent = "全おぱんちゅ進化、達成。これは強い。";
      } else if (gameOver) {
        messageEl.textContent = "盤面いっぱい。もう一回で記憶を取り戻そう。";
      } else {
        messageEl.textContent = `次は${items[nextRank].name}を目指そう。`;
      }
    }

    function slideLine(line) {
      const compact = line.filter((value) => value !== null);
      const merged = [];
      let gained = 0;
      for (let i = 0; i < compact.length; i += 1) {
        if (compact[i] !== null && compact[i] === compact[i + 1] && compact[i] < items.length - 1) {
          const next = compact[i] + 1;
          merged.push(next);
          gained += (next + 1) * 10;
          maxRank = Math.max(maxRank, next);
          i += 1;
        } else {
          merged.push(compact[i]);
        }
      }
      while (merged.length < size) merged.push(null);
      return { line: merged, gained };
    }

    function move(direction) {
      if (gameOver) return;
      const before = JSON.stringify(grid);
      let gained = 0;
      if (direction === "left" || direction === "right") {
        for (let r = 0; r < size; r += 1) {
          const source = direction === "left" ? grid[r] : [...grid[r]].reverse();
          const result = slideLine(source);
          grid[r] = direction === "left" ? result.line : result.line.reverse();
          gained += result.gained;
        }
      } else {
        for (let c = 0; c < size; c += 1) {
          const col = [];
          for (let r = 0; r < size; r += 1) col.push(grid[r][c]);
          const source = direction === "up" ? col : col.reverse();
          const result = slideLine(source);
          const nextCol = direction === "up" ? result.line : result.line.reverse();
          for (let r = 0; r < size; r += 1) grid[r][c] = nextCol[r];
          gained += result.gained;
        }
      }
      if (JSON.stringify(grid) === before) return;
      score += gained;
      addRandomTile();
      gameOver = !hasMoves();
      render();
      if (gained > 0) showToast(`${gained}点マージ`);
    }

    function hasMoves() {
      for (let r = 0; r < size; r += 1) {
        for (let c = 0; c < size; c += 1) {
          const value = grid[r][c];
          if (value === null) return true;
          if (r < size - 1 && grid[r + 1][c] === value && value < items.length - 1) return true;
          if (c < size - 1 && grid[r][c + 1] === value && value < items.length - 1) return true;
        }
      }
      return false;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 900);
    }

    async function copyResult() {
      const text = `おぱんちゅマージで${score}点、最大札は${items[maxRank].name}でした。`;
      try {
        await navigator.clipboard.writeText(text);
        showToast("結果をコピーしました");
      } catch {
        showToast("コピーできませんでした");
      }
    }

    document.addEventListener("keydown", (event) => {
      const map = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
      if (!map[event.key]) return;
      event.preventDefault();
      move(map[event.key]);
    });
    boardEl.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
    }, { passive: true });
    boardEl.addEventListener("touchend", (event) => {
      if (!touchStart) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
      move(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up"));
    }, { passive: true });
    document.getElementById("resetBtn").addEventListener("click", setup);
    document.getElementById("copyBtn").addEventListener("click", copyResult);
    setup();
  </script>
</body>
</html>
