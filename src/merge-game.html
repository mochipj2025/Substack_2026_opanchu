<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おぱんちゅマージ</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #111;
      --pink: #ff67b3;
      --yellow: #ffe66f;
      --mint: #35ffd4;
      --blue: #7dd7ff;
      --paper: #fffaf0;
      --shadow: 6px 6px 0 var(--ink);
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(17, 17, 17, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, .08) 1px, transparent 1px),
        linear-gradient(135deg, var(--yellow), #ff9bd1 48%, var(--mint));
      background-size: 22px 22px, 22px 22px, auto;
    }
    button, a { color: inherit; font: inherit; }
    main {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand, .icon-btn, .panel, .stat, .side-card {
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }
    .brand {
      padding: 10px 14px;
      font-weight: 1000;
      line-height: 1.1;
    }
    .brand span {
      display: block;
      font-size: 12px;
      letter-spacing: 0;
    }
    .actions {
      display: flex;
      gap: 10px;
    }
    .icon-btn {
      display: grid;
      place-items: center;
      min-width: 48px;
      min-height: 48px;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: 4px 4px 0 var(--ink);
      padding: 8px 12px;
      text-decoration: none;
      font-weight: 1000;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .icon-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 1px 1px 0 var(--ink);
    }
    .panel {
      overflow: hidden;
      background: var(--paper);
    }
    .game-head {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-bottom: 4px solid var(--ink);
      background: var(--blue);
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 64px);
      line-height: .95;
      letter-spacing: 0;
    }
    .lead {
      margin: 8px 0 0;
      max-width: 720px;
      font-weight: 900;
      line-height: 1.55;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      padding: 9px;
      box-shadow: 4px 4px 0 var(--ink);
      text-align: center;
      min-width: 0;
    }
    .stat-label {
      display: block;
      font-size: 12px;
      font-weight: 900;
    }
    .stat-value {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 22px;
      font-weight: 1000;
      line-height: 1;
    }
    .play-area {
      display: grid;
      gap: 14px;
      padding: 14px;
    }
    .board-wrap {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .rule-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: #fff8d9;
      box-shadow: 5px 5px 0 var(--ink);
      padding: 10px;
      font-weight: 1000;
    }
    .rule-strip img {
      width: 100%;
      max-width: 78px;
      aspect-ratio: 1 / 1;
      justify-self: center;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: white;
      object-fit: contain;
      padding: 4px;
    }
    .rule-symbol {
      font-size: 24px;
      text-align: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      width: calc(100% - 8px);
      max-width: 620px;
      margin: 0 auto;
    }
    .slot {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1 / 1;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, .62);
      box-shadow: 4px 4px 0 rgba(17, 17, 17, .28);
      overflow: hidden;
    }
    .slot.empty::after {
      content: "+";
      color: rgba(17, 17, 17, .18);
      font-size: 34px;
      font-weight: 1000;
    }
    .tile {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 4px;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
      padding: 6px;
      cursor: pointer;
    }
    .tile img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      filter: drop-shadow(0 4px 0 rgba(17, 17, 17, .16));
    }
    .tile span {
      overflow: hidden;
      text-align: center;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: clamp(10px, 2.6vw, 13px);
      font-weight: 1000;
      line-height: 1.05;
    }
    .tile.selected {
      background: #fff2a6;
      outline: 5px solid var(--pink);
      outline-offset: -8px;
    }
    .tile.matchable {
      background: #d9fff3;
      animation: pulse .8s ease-in-out infinite;
    }
    .tile.created {
      animation: pop .18s ease-out;
      background: #fff2a6;
    }
    @keyframes pop {
      from { transform: scale(.82) rotate(-4deg); }
      60% { transform: scale(1.12) rotate(2deg); }
      to { transform: scale(1) rotate(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(.96); }
    }
    .message {
      min-height: 54px;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: 5px 5px 0 var(--ink);
      padding: 12px;
      font-weight: 1000;
      line-height: 1.45;
    }
    .side {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .side-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      box-shadow: 5px 5px 0 var(--ink);
    }
    .side-card h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
    }
    .target {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .target img {
      width: 82px;
      aspect-ratio: 1 / 1;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: #fffaf0;
      object-fit: contain;
      padding: 5px;
    }
    .target p {
      margin: 0;
      font-weight: 900;
      line-height: 1.45;
    }
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .wide-btn {
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--ink);
      padding: 12px;
      font-weight: 1000;
      cursor: pointer;
    }
    .wide-btn.secondary {
      background: white;
    }
    .dex {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 5px;
    }
    .dex img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: white;
      object-fit: contain;
      padding: 2px;
      opacity: .28;
    }
    .dex img.unlocked {
      opacity: 1;
      background: #fff2a6;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      display: none;
      transform: translateX(-50%);
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: white;
      box-shadow: 5px 5px 0 var(--ink);
      padding: 10px 16px;
      font-weight: 1000;
      text-align: center;
      width: min(420px, calc(100% - 32px));
    }
    .toast.show { display: block; }
    @media (min-width: 860px) {
      main { padding: 24px; }
      .game-head {
        grid-template-columns: minmax(0, 1fr) 330px;
        align-items: end;
        padding: 18px;
      }
      .play-area {
        grid-template-columns: minmax(0, 640px) 290px;
        justify-content: center;
        align-items: start;
        padding: 18px;
      }
    }
    @media (max-width: 460px) {
      main { padding: 10px; }
      .topbar { align-items: stretch; }
      .brand { flex: 1; }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .stat { padding: 7px 5px; }
      .stat-value { font-size: 18px; }
      .board { gap: 7px; }
      .slot { border-width: 3px; }
      .tile { padding: 4px; }
      .tile span { display: none; }
      .rule-strip {
        grid-template-columns: 54px 18px 54px 18px 54px;
        justify-content: center;
      }
      .rule-strip img { max-width: 54px; }
      .rule-symbol { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div class="brand"><span>OPANCHU MERGE CLOSET</span>おぱんちゅマージ</div>
      <div class="actions">
        <a class="icon-btn" href="../index.html" title="入口へ戻る" aria-label="入口へ戻る">⌂</a>
        <button class="icon-btn" id="resetBtn" type="button" title="最初から" aria-label="最初から">↻</button>
      </div>
    </div>

    <section class="panel" aria-label="おぱんちゅマージ">
      <div class="game-head">
        <div>
          <h1>おぱんちゅ<br>マージ</h1>
          <p class="lead">同じパンツ札を2枚タップして合成。01 + 01 = 02、02 + 02 = 03。クローゼットをいっぱいにする前に12番札を目指します。</p>
        </div>
        <div class="stats" aria-label="スコア">
          <div class="stat"><span class="stat-label">スコア</span><span class="stat-value" id="score">0</span></div>
          <div class="stat"><span class="stat-label">最高</span><span class="stat-value" id="best">0</span></div>
          <div class="stat"><span class="stat-label">最大札</span><span class="stat-value" id="maxTile">01</span></div>
        </div>
      </div>

      <div class="play-area">
        <div class="board-wrap">
          <div class="rule-strip" aria-label="合成ルール">
            <img src="../assets/shorts/p01.png" alt="">
            <span class="rule-symbol">+</span>
            <img src="../assets/shorts/p01.png" alt="">
            <span class="rule-symbol">=</span>
            <img src="../assets/shorts/p02.png" alt="">
          </div>
          <div class="board" id="board" aria-label="クローゼット盤面"></div>
          <div class="message" id="message">同じ札を2枚選ぶと合成できます。</div>
        </div>

        <aside class="side" aria-label="進行状況">
          <div class="side-card">
            <h2>次の目標</h2>
            <div class="target">
              <img id="targetImage" src="../assets/shorts/p02.png" alt="">
              <p id="targetText">まずは02番札を作ろう。</p>
            </div>
          </div>
          <div class="side-card">
            <h2>操作</h2>
            <div class="actions-grid">
              <button class="wide-btn" id="drawBtn" type="button">1枚補充</button>
              <button class="wide-btn secondary" id="hintBtn" type="button">合成できる札を光らせる</button>
              <button class="wide-btn secondary" id="copyBtn" type="button">結果コピー</button>
            </div>
          </div>
          <div class="side-card">
            <h2>図鑑</h2>
            <div class="dex" id="dex" aria-label="解放済み札"></div>
          </div>
        </aside>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const items = [
      { name: "おぱんちゅ 01", src: "../assets/shorts/p01.png" },
      { name: "おぱんちゅ 02", src: "../assets/shorts/p02.png" },
      { name: "おぱんちゅ 03", src: "../assets/shorts/p03.png" },
      { name: "おぱんちゅ 04", src: "../assets/shorts/p04.png" },
      { name: "おぱんちゅ 05", src: "../assets/shorts/p05.png" },
      { name: "おぱんちゅ 06", src: "../assets/shorts/p06.png" },
      { name: "おぱんちゅ 07", src: "../assets/shorts/p07.png" },
      { name: "おぱんちゅ 08", src: "../assets/shorts/p08.png" },
      { name: "おぱんちゅ 09", src: "../assets/shorts/p09.png" },
      { name: "おぱんちゅ 10", src: "../assets/shorts/p10.png" },
      { name: "おぱんちゅ 11", src: "../assets/shorts/p11.png" },
      { name: "おぱんちゅ 12", src: "../assets/shorts/p12.png" }
    ];
    const slotCount = 16;
    const bestKey = "opanchu_merge_closet_best";
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const maxTileEl = document.getElementById("maxTile");
    const targetImageEl = document.getElementById("targetImage");
    const targetTextEl = document.getElementById("targetText");
    const messageEl = document.getElementById("message");
    const dexEl = document.getElementById("dex");
    const toastEl = document.getElementById("toast");
    let slots = [];
    let selectedIndex = null;
    let score = 0;
    let maxRank = 0;
    let lastCreatedIndex = null;
    let hintRank = null;
    let gameEnded = false;

    function setup() {
      slots = Array(slotCount).fill(null);
      selectedIndex = null;
      score = 0;
      maxRank = 0;
      lastCreatedIndex = null;
      hintRank = null;
      gameEnded = false;
      for (let i = 0; i < 6; i += 1) addRandomTile(false);
      render();
      setMessage("同じ札を2枚選ぶと合成できます。");
    }

    function randomStarterRank() {
      const roll = Math.random();
      if (maxRank >= 4 && roll > .92) return 2;
      if (maxRank >= 2 && roll > .76) return 1;
      return 0;
    }

    function emptyIndexes() {
      return slots.map((value, index) => value === null ? index : null).filter((value) => value !== null);
    }

    function addRandomTile(showMessage = true) {
      if (gameEnded) return false;
      const empties = emptyIndexes();
      if (!empties.length) {
        checkEndState();
        return false;
      }
      const index = empties[Math.floor(Math.random() * empties.length)];
      slots[index] = randomStarterRank();
      lastCreatedIndex = index;
      if (showMessage) setMessage(`${items[slots[index]].name}を補充しました。`);
      checkEndState();
      return true;
    }

    function render() {
      boardEl.innerHTML = "";
      slots.forEach((rank, index) => {
        const slot = document.createElement("div");
        slot.className = `slot ${rank === null ? "empty" : ""}`;
        if (rank !== null) {
          const item = items[rank];
          const selected = selectedIndex === index;
          const matchable = hintRank !== null && rank === hintRank;
          const created = lastCreatedIndex === index;
          slot.innerHTML = `
            <button class="tile ${selected ? "selected" : ""} ${matchable ? "matchable" : ""} ${created ? "created" : ""}" type="button" data-index="${index}">
              <img src="${item.src}" alt="">
              <span>${item.name}</span>
            </button>
          `;
        }
        boardEl.appendChild(slot);
      });
      boardEl.querySelectorAll("[data-index]").forEach((button) => {
        button.addEventListener("click", () => selectTile(Number(button.dataset.index)));
      });
      const best = Math.max(Number(localStorage.getItem(bestKey) || 0), score);
      localStorage.setItem(bestKey, String(best));
      scoreEl.textContent = score;
      bestEl.textContent = best;
      maxTileEl.textContent = String(maxRank + 1).padStart(2, "0");
      const targetRank = Math.min(maxRank + 1, items.length - 1);
      targetImageEl.src = items[targetRank].src;
      targetTextEl.textContent = maxRank >= items.length - 1 ? "12番札達成。完全勝利です。" : `次は${items[targetRank].name}を作ろう。`;
      dexEl.innerHTML = items.map((item, index) => `<img class="${index <= maxRank ? "unlocked" : ""}" src="${item.src}" alt="">`).join("");
    }

    function selectTile(index) {
      if (gameEnded || slots[index] === null) return;
      hintRank = null;
      lastCreatedIndex = null;
      if (selectedIndex === null) {
        selectedIndex = index;
        setMessage(`${items[slots[index]].name}を選択中。同じ札をもう1枚タップ。`);
        render();
        return;
      }
      if (selectedIndex === index) {
        selectedIndex = null;
        setMessage("選択を解除しました。");
        render();
        return;
      }
      if (slots[selectedIndex] !== slots[index]) {
        selectedIndex = index;
        setMessage("違う札なので合成できません。同じ札を選んでください。");
        render();
        return;
      }
      mergeTiles(selectedIndex, index);
    }

    function mergeTiles(firstIndex, secondIndex) {
      const fromRank = slots[firstIndex];
      if (fromRank >= items.length - 1) {
        selectedIndex = null;
        setMessage("12番札は最終形です。これ以上は合成できません。");
        render();
        return;
      }
      const nextRank = fromRank + 1;
      slots[firstIndex] = nextRank;
      slots[secondIndex] = null;
      selectedIndex = null;
      lastCreatedIndex = firstIndex;
      maxRank = Math.max(maxRank, nextRank);
      score += (nextRank + 1) * 20;
      setMessage(`${items[fromRank].name} + ${items[fromRank].name} = ${items[nextRank].name}`);
      showToast(`${items[nextRank].name}に進化`);
      if (maxRank >= items.length - 1) {
        gameEnded = true;
        setMessage("12番札まで進化。おぱんちゅマージ完全勝利。");
      } else {
        addRandomTile(false);
      }
      checkEndState();
      render();
    }

    function hasPair() {
      const counts = new Map();
      slots.forEach((rank) => {
        if (rank === null || rank >= items.length - 1) return;
        counts.set(rank, (counts.get(rank) || 0) + 1);
      });
      return [...counts.values()].some((count) => count >= 2);
    }

    function firstPairRank() {
      const seen = new Set();
      for (const rank of slots) {
        if (rank === null || rank >= items.length - 1) continue;
        if (seen.has(rank)) return rank;
        seen.add(rank);
      }
      return null;
    }

    function checkEndState() {
      if (gameEnded) return;
      if (emptyIndexes().length === 0 && !hasPair()) {
        gameEnded = true;
        setMessage("クローゼット満杯。合成できる札がありません。");
      }
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function showHint() {
      const rank = firstPairRank();
      if (rank === null) {
        setMessage("今は合成できるペアがありません。1枚補充するか、最初からやり直そう。");
        hintRank = null;
      } else {
        hintRank = rank;
        setMessage(`${items[rank].name}が合成できます。光っている札を2枚タップ。`);
      }
      render();
    }

    function drawTile() {
      selectedIndex = null;
      hintRank = null;
      lastCreatedIndex = null;
      if (!addRandomTile(true)) setMessage("空き枠がありません。合成できる札を探そう。");
      render();
    }

    async function copyResult() {
      const text = `おぱんちゅマージで${score}点、最大札は${items[maxRank].name}でした。`;
      try {
        await navigator.clipboard.writeText(text);
        showToast("結果をコピーしました");
      } catch {
        showToast("コピーできませんでした");
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 1200);
    }

    document.getElementById("resetBtn").addEventListener("click", setup);
    document.getElementById("drawBtn").addEventListener("click", drawTile);
    document.getElementById("hintBtn").addEventListener("click", showHint);
    document.getElementById("copyBtn").addEventListener("click", copyResult);
    setup();
  </script>
</body>
</html>
