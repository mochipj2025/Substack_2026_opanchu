<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おぱんちゅラボ</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #111;
      --pink: #ff67b3;
      --yellow: #ffe66f;
      --blue: #7dd7ff;
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(17, 17, 17, .06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, .06) 1px, transparent 1px),
        linear-gradient(135deg, #ffe66f 0%, #ff8fc8 48%, #35ffd4 100%);
      background-size: 24px 24px, 24px 24px, auto;
    }
    a { color: inherit; text-decoration: none; }
    .page {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 18px;
    }
    .hero {
      position: relative;
      display: grid;
      min-height: min(760px, calc(100vh - 36px));
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }
    .hero-link {
      display: grid;
      place-items: center;
      min-height: inherit;
    }
    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 620px) {
      .page { padding: 12px; }
      .hero {
        min-height: calc(100vh - 24px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="おぱんちゅラボ入口">
      <h1 class="sr-only">おぱんちゅラボ</h1>
      <a class="hero-link" href="src/portal.html" aria-label="ゲームページへ">
        <img class="logo" src="assets/opanchu-hero-logo.png" alt="">
      </a>
    </section>
  </main>
</body>
</html>
