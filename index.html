<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おぱんちゅラボ</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #111;
      --pink: #ff67b3;
      --yellow: #ffe66f;
      --blue: #7dd7ff;
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(17, 17, 17, .06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 17, 17, .06) 1px, transparent 1px),
        linear-gradient(135deg, #ffe66f 0%, #ff8fc8 48%, #35ffd4 100%);
      background-size: 24px 24px, 24px 24px, auto;
    }
    a { color: inherit; text-decoration: none; }
    .page {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 18px;
    }
    .hero {
      position: relative;
      display: grid;
      min-height: min(760px, calc(100vh - 36px));
      border: 0;
      border-radius: 8px;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }
    .hero-link {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      place-items: center;
      gap: clamp(10px, 3vw, 22px);
      min-height: inherit;
      padding: clamp(16px, 4vw, 44px);
    }
    .logo {
      width: min(100%, 1080px);
      max-height: 420px;
      object-fit: contain;
      display: block;
    }
    .enter-sign {
      width: min(88%, 820px);
      max-height: 260px;
      object-fit: contain;
      display: block;
      transform: translateY(-10px);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (max-width: 620px) {
      .page { padding: 12px; }
      .hero {
        min-height: calc(100vh - 24px);
      }
      .hero-link {
        padding: 12px 6px;
      }
      .logo {
        max-height: 300px;
      }
      .enter-sign {
        width: 100%;
        max-height: 230px;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="おぱんちゅラボ入口">
      <h1 class="sr-only">おぱんちゅラボ</h1>
      <a class="hero-link" href="src/portal.html" aria-label="ゲームページへ">
        <img class="logo" src="assets/opanchu-hero-logo.png" alt="">
        <img class="enter-sign" src="assets/opanchu-enter-sign.png" alt="">
      </a>
    </section>
  </main>
</body>
</html>
